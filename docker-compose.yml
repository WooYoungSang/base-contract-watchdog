version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - BASE_RPC_WSS=wss://base-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}
    volumes:
      - watchdog_data:/app/data
    command: uvicorn contract_watchdog.api:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  watchdog_data:
